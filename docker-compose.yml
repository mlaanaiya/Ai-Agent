# docker-compose for local development and Gandi Simple Hosting deployment.
#
# Ollama runs locally for free LLM inference — no API key needed.
# The MCP server runs as its own long-lived container.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ai-agent-ollama
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    # GPU pass-through (uncomment if a GPU is available):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

  mcp-drive:
    build: .
    image: ai-agent:latest
    container_name: ai-agent-mcp-drive
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./secrets:/app/secrets:ro
      - ./audit:/app/audit
    command: ["python", "-m", "mcp_drive_server"]

  orchestrator:
    build: .
    image: ai-agent:latest
    env_file: .env
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434/v1"
    volumes:
      - ./secrets:/app/secrets:ro
      - ./audit:/app/audit
    depends_on:
      - mcp-drive
      - ollama
    stdin_open: true
    tty: true
    entrypoint: ["python", "-m", "orchestrator"]
    command: ["chat"]

  web:
    build: .
    image: ai-agent:latest
    container_name: ai-agent-web
    restart: unless-stopped
    env_file: .env
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      OLLAMA_BASE_URL: "http://ollama:11434/v1"
    volumes:
      - ./secrets:/app/secrets:ro
      - ./audit:/app/audit
    ports:
      - "8000:8000"
    depends_on:
      - mcp-drive
      - ollama
    entrypoint: ["python", "-m", "web"]

  scheduler:
    build: .
    image: ai-agent:latest
    container_name: ai-agent-scheduler
    restart: unless-stopped
    env_file: .env
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434/v1"
    volumes:
      - ./secrets:/app/secrets:ro
      - ./audit:/app/audit
      - ./config:/app/config:ro
    depends_on:
      - mcp-drive
      - ollama
    entrypoint: ["python", "-m", "automation"]

volumes:
  ollama-models:
